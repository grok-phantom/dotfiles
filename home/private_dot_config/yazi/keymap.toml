# Ranger-like bindings layered on top of Yazi defaults.

[[mgr.prepend_keymap]]
on   = "h"
run  = "leave"
desc = "Go to parent directory"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on   = [ "g", "g" ]
run  = "arrow top"
desc = "Go to top"

[[mgr.prepend_keymap]]
on   = "G"
run  = "arrow bot"
desc = "Go to bottom"

[[mgr.prepend_keymap]]
on   = "<C-d>"
run  = "arrow 50%"
desc = "Move cursor down half page"

[[mgr.prepend_keymap]]
on   = "<C-u>"
run  = "arrow -50%"
desc = "Move cursor up half page"

[[mgr.prepend_keymap]]
on   = [ "y", "y" ]
run  = "yank"
desc = "Yank selected files"

[[mgr.prepend_keymap]]
on   = [ "d", "d" ]
run  = "yank --cut"
desc = "Cut selected files"

[[mgr.prepend_keymap]]
on   = "p"
run  = "paste"
desc = "Paste yanked files"

[[mgr.prepend_keymap]]
on   = "r"
run  = "rename --cursor=before_ext"
desc = "Rename selected file"

[[mgr.prepend_keymap]]
on   = "v"
run  = "visual_mode"
desc = "Enter visual mode"

[[mgr.prepend_keymap]]
on   = "."
run  = "hidden toggle"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on   = "/"
run  = "find --smart"
desc = "Find next file"

[[mgr.prepend_keymap]]
on   = ":"
run  = "shell --block --interactive"
desc = "Run a shell command"

[[mgr.prepend_keymap]]
on   = "t"
run  = "tab_create --current"
desc = "Create a new tab in CWD"

[[mgr.prepend_keymap]]
on   = [ "g", "t" ]
run  = "tab_switch 1 --relative"
desc = "Switch to next tab"

[[mgr.prepend_keymap]]
on   = [ "g", "T" ]
run  = "tab_switch -1 --relative"
desc = "Switch to previous tab"
